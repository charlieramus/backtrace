         basemap on <canvas id="map">; the real app swaps that for a real Leaflet

         legend, …) built in Stages 4–5. -->

      <div id="map"></div>
      <div class="map-vignette"></div>

      <div class="overlay" id="overlay">
        <!-- toolbar, top-right cluster, north, scale, legend, panel land here in Stages 4–5 -->
      </div>
    </div>
