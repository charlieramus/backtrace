<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Backtrace</title>
  </head>
  <body>
    <!-- App frame, ported from design/mockup.reference.html. The mockup faked the
         basemap on <canvas id="map">; the real app swaps that for a real Leaflet
         map on <div id="map">. The .overlay holds the chrome (toolbar, panel,
         legend, …) built in Stages 4–5. -->
    <div class="app">
      <div id="map"></div>
      <div class="map-vignette"></div>

      <div class="overlay" id="overlay">
        <!-- toolbar (Stage 4) -->
        <div class="toolbar frost">
          <div class="brand">
            <div class="mark" aria-hidden="true"></div>
            <div>
              <b>Backtrace</b>
              <span>Origin Tracer</span>
            </div>
          </div>
          <div class="tdiv"></div>
          <button class="tbtn primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            Add node
          </button>
          <button class="tbtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h7l-1 8 10-12h-7z"/></svg>
            Load demo
          </button>
          <button class="tbtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0-12 4 4m-4-4-4 4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
            Import
          </button>
          <button class="tbtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3m0 12-4-4m4 4 4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
            Export
          </button>
        </div>

        <!-- online status + theme toggle (Stage 4) -->
        <div class="topright">
          <button class="theme-toggle frost" id="themeBtn" aria-label="Switch light / dark">
            <svg class="ico ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M2 12h2m16 0h2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>
            <svg class="ico ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          </button>
          <div class="status frost" id="statusChip">
            <span class="dot"></span><span class="status-label">Offline-ready · no account</span>
          </div>
        </div>

        <!-- north, scale, legend, panel land here in Stage 5 -->
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
